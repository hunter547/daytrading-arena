services:
  # 1. Zookeeper (required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: futures-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: futures-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - trading-network
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 5

  # 2b. Topic Initialization (one-shot)
  init-topics:
    image: confluentinc/cp-kafka:7.5.0
    container_name: futures-init-topics
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - ./create-topics.sh:/create-topics.sh
      - ./agents.yml:/agents.yml:ro
    command: ["bash", "/create-topics.sh"]
    networks:
      - trading-network
    restart: "no"

  # 3. Market Data Connector (TopstepX -> Kafka)
  market-connector:
    build: .
    container_name: futures-market-connector
    depends_on:
      kafka:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TOPSTEPX_USERNAME=${TOPSTEPX_USERNAME}
      - TOPSTEPX_API_KEY=${TOPSTEPX_API_KEY}
      - TOPSTEPX_ENVIRONMENT=${TOPSTEPX_ENVIRONMENT:-demo}
      - SERVICE_NAME=unified_market_connector
    command: >
      python unified_market_connector.py
      --provider topstepx
      --symbols CON.F.US.MES.H26
      --bootstrap-servers kafka:9092
      --candles-only
    networks:
      - trading-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # 4. MySQL (Simulated Trading Accounts)
  mysql:
    image: mysql:8.0
    container_name: futures-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
      MYSQL_DATABASE: trading_arena
      MYSQL_USER: trading
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-trading_pass}
    ports:
      - "3306:3306"
    networks:
      - trading-network
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # 5. TopstepX Trading Tools Service
  trading-tools:
    build: .
    container_name: futures-trading-tools
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TOPSTEPX_USERNAME=${TOPSTEPX_USERNAME}
      - TOPSTEPX_API_KEY=${TOPSTEPX_API_KEY}
      - TOPSTEPX_ENVIRONMENT=${TOPSTEPX_ENVIRONMENT:-demo}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=trading
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-trading_pass}
      - MYSQL_DATABASE=trading_arena
      - SERVICE_NAME=topstepx_trading_tools
      - DASHBOARD_PORT=8080
      - DASHBOARD_VIEW_ONLY=${DASHBOARD_VIEW_ONLY:-true}
      - AGENT_NAME=futures-trader
      - AGENT_MODEL=gpt-5-nano
      - AGENT_STRATEGY=futures
      - TOPSTEPX_STREAM_SYMBOLS=CON.F.US.MES.H26
      - TOPSTEP_REFRESH_TOKEN=${TOPSTEP_REFRESH_TOKEN:-}
      - MIRROR_AGENT=${MIRROR_AGENT:-}
    command: >
      python topstepx_trading_tools.py
      --bootstrap-servers kafka:9092
    ports:
      - "8080:8080"
    networks:
      - trading-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # 5b. Tools & Dashboard (Crypto - optional)
  dashboard:
    build: .
    container_name: futures-dashboard
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TOPSTEPX_USERNAME=${TOPSTEPX_USERNAME}
      - TOPSTEPX_API_KEY=${TOPSTEPX_API_KEY}
      - TOPSTEPX_ENVIRONMENT=${TOPSTEPX_ENVIRONMENT:-demo}
      - SERVICE_NAME=tools_and_dashboard
    command: >
      python tools_and_dashboard.py
      --bootstrap-servers kafka:9092
    networks:
      - trading-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    profiles:
      - crypto

  # 6. Agent Launcher (reads agents.yml, spawns ChatNodes + Agent Routers)
  agents:
    build: .
    container_name: futures-agents
    depends_on:
      kafka:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully
      market-connector:
        condition: service_started
      trading-tools:
        condition: service_started
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - SERVICE_NAME=agent_launcher
    command: >
      python agent_launcher.py
      --bootstrap-servers kafka:9092
    networks:
      - trading-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./agents.yml:/app/agents.yml:ro

  # 7. Response Viewer (Optional - Agent Activity Monitor)
  response-viewer:
    build: .
    container_name: futures-response-viewer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVICE_NAME=response_viewer
    command: >
      python response_viewer.py
      --bootstrap-servers kafka:9092
    networks:
      - trading-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    profiles:
      - monitoring

networks:
  trading-network:
    driver: bridge

volumes:
  logs:
    driver: local
  mysql-data:
    driver: local
