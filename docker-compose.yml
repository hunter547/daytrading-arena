services:
  # 1. Zookeeper (required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: futures-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: futures-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - trading-network
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 10s
      timeout: 10s
      retries: 5

  # 3. Market Data Connector (TopstepX → Kafka) - THIS TRIGGERS THE AGENT!
  market-connector:
    build: .
    container_name: futures-market-connector
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TOPSTEPX_USERNAME=${TOPSTEPX_USERNAME}
      - TOPSTEPX_API_KEY=${TOPSTEPX_API_KEY}
      - TOPSTEPX_ENVIRONMENT=${TOPSTEPX_ENVIRONMENT:-demo}
      - SERVICE_NAME=unified_market_connector
    command: >
      python unified_market_connector.py
      --provider topstepx
      --symbols CON.F.US.MES.H26 CON.F.US.MNQ.H26
      --bootstrap-servers kafka:9092
      --router-name futures-trader
      --candles-only
    networks:
      - trading-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # 4. TopstepX Trading Tools Service
  trading-tools:
    build: .
    container_name: futures-trading-tools
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TOPSTEPX_USERNAME=${TOPSTEPX_USERNAME}
      - TOPSTEPX_API_KEY=${TOPSTEPX_API_KEY}
      - TOPSTEPX_ENVIRONMENT=${TOPSTEPX_ENVIRONMENT:-demo}
      - SERVICE_NAME=topstepx_trading_tools
      - DASHBOARD_PORT=8080
      - DASHBOARD_VIEW_ONLY=${DASHBOARD_VIEW_ONLY:-true}
      - AGENT_NAME=futures-trader
      - AGENT_MODEL=gpt-5-nano
      - AGENT_STRATEGY=futures
      - TOPSTEPX_STREAM_SYMBOLS=CON.F.US.MES.H26,CON.F.US.MNQ.H26
    command: >
      python topstepx_trading_tools.py
      --bootstrap-servers kafka:9092
    ports:
      - "8080:8080"
    networks:
      - trading-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # 5. Tools & Dashboard (Trading Tools + Terminal UI)
  # NOTE: This service is for CRYPTO trading (Coinbase), not futures
  # For futures trading, disable this service or use --scale dashboard=0
  dashboard:
    build: .
    container_name: futures-dashboard
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TOPSTEPX_USERNAME=${TOPSTEPX_USERNAME}
      - TOPSTEPX_API_KEY=${TOPSTEPX_API_KEY}
      - TOPSTEPX_ENVIRONMENT=${TOPSTEPX_ENVIRONMENT:-demo}
      - SERVICE_NAME=tools_and_dashboard
    command: >
      python tools_and_dashboard.py
      --bootstrap-servers kafka:9092
    networks:
      - trading-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    profiles:
      - crypto
    # Note: Dashboard is terminal-based (Rich), not web-based
    # To view: docker-compose logs -f dashboard

  # 6. ChatNode (LLM Inference - GPT-5 Nano)
  chatnode:
    build: .
    container_name: futures-chatnode
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERVICE_NAME=deploy_chat_node
    command: >
      python deploy_chat_node.py
      --name gpt5-nano
      --model-id gpt-5-nano
      --bootstrap-servers kafka:9092
      --reasoning-effort high
    networks:
      - trading-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # 7. Agent Router (Futures Trader)
  agent:
    build: .
    container_name: futures-agent
    depends_on:
      kafka:
        condition: service_healthy
      chatnode:
        condition: service_started
      market-connector:
        condition: service_started
      trading-tools:
        condition: service_started
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVICE_NAME=deploy_router_node
    command: >
      python deploy_router_node.py
      --name futures-trader
      --chat-node-name gpt5-nano
      --strategy futures
      --bootstrap-servers kafka:9092
    networks:
      - trading-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # 8. Response Viewer (Optional - Agent Activity Monitor)
  response-viewer:
    build: .
    container_name: futures-response-viewer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SERVICE_NAME=response_viewer
    command: >
      python response_viewer.py
      --bootstrap-servers kafka:9092
    networks:
      - trading-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    profiles:
      - monitoring

networks:
  trading-network:
    driver: bridge

volumes:
  logs:
    driver: local
