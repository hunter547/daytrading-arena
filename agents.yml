# Agent Arena Configuration
# Each agent gets its own sim account (auto-created on first trade).
# Agents sharing the same model reuse the same ChatNode process.
#
# Edit this file and restart the `agents` service:
#   docker compose -f docker-compose.host-network.yml restart agents

models:
  gpt-5-nano:
    model_id: gpt-5-nano
    api_key_env: OPENAI_API_KEY      # env var name containing the key
    reasoning_effort: low
    logo: openai                     # logo key used in dashboard
    # base_url: null                  # default = OpenAI
    # max_workers: 1

  step-3.5-flash:
    model_id: stepfun/step-3.5-flash
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    logo: stepfun

  nemotron-3-nano:
    model_id: nvidia/nemotron-3-nano-30b-a3b:free
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    logo: nvidia

  hermes-405b:
    model_id: nousresearch/hermes-3-llama-3.1-405b:free
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    logo: nousresearch

  trinity-large-preview:
    model_id: nvidia/nemotron-3-super-120b-a12b:free
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    logo: nvidia

  hunter-alpha:
    model_id: xiaomi/mimo-v2.5-pro
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    logo: openrouter

  glm-4.5-air:
    model_id: z-ai/glm-4.5-air
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    logo: zhipu

  healer-alpha:
    model_id: xiaomi/mimo-v2.5
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    logo: openrouter

  # claude-sonnet:
  #   model_id: anthropic/claude-sonnet-4-6
  #   api_key_env: OPENROUTER_API_KEY
  #   base_url: https://openrouter.ai/api/v1

agents:
  # Only hunter-trader runs (promoted to the real combine account).
  # Other agents are commented out to save tokens — re-enable as needed.
  hunter-trader:
    model: hunter-alpha
    strategy: brainrot

