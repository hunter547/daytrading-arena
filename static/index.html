<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopstepX Agent Arena</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --blue: #58a6ff;
    --yellow: #d29922;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    padding: 16px;
  }
  h1 {
    font-size: 18px;
    margin-bottom: 16px;
    color: var(--blue);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
    display: inline-block;
  }
  .status-dot.connected { background: var(--green); }

  /* Per-agent dashboard card */
  .agent-dashboard {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    padding: 16px;
    margin-bottom: 16px;
  }
  .agent-dashboard.blown {
    border-color: var(--red);
    background: rgba(248,81,73,0.03);
  }
  .agent-dash-header {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .agent-dash-header.expanded {
    margin-bottom: 14px;
  }
  .agent-dash-header:not(.expanded) {
    border-bottom: none;
    padding-bottom: 0;
  }
  .header-chevron {
    font-size: 18px;
    color: var(--text-dim);
    transition: transform 0.3s ease;
    flex-shrink: 0;
    margin-left: 6px;
  }
  .header-chevron.open {
    transform: rotate(180deg);
  }
  .agent-dash-body {
    overflow: hidden;
    transition: max-height 0.35s ease, opacity 0.25s ease;
  }
  .agent-dash-body.collapsed {
    max-height: 0;
    opacity: 0;
    pointer-events: none;
  }
  .agent-dash-name { font-weight: 700; font-size: 16px; }
  .agent-dash-meta { font-size: 11px; color: var(--text-dim); }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-bullish { background: rgba(63,185,80,0.15); color: var(--green); border: 1px solid var(--green); }
  .badge-bearish { background: rgba(248,81,73,0.15); color: var(--red); border: 1px solid var(--red); }
  .badge-neutral { background: rgba(139,148,158,0.15); color: var(--text-dim); border: 1px solid var(--border); }
  .badge-mirror { background: rgba(227,164,85,0.12); border: 1px solid #e3a455; }
  .badge-mirror span { background: linear-gradient(#f6dba6 25%, #e3a455 80%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .badge-live { background: rgba(63,185,80,0.2); color: var(--green); border: 1px solid var(--green); font-weight: 700; animation: pulse-live 3s infinite; }
  @keyframes pulse-live { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
  .badge-blown { background: rgba(248,81,73,0.2); color: var(--red); border: 1px solid var(--red); animation: pulse-blown 2s infinite; }
  @keyframes pulse-blown { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .badge-copy { background: rgba(88,166,255,0.18); color: var(--blue); border: 1px solid var(--blue); font-weight: 700; }

  /* NinjaTrader copy-account sub-panel */
  .copy-account {
    border: 1px solid var(--blue);
    border-radius: 6px;
    padding: 10px 12px;
    margin: 8px 0 12px;
    background: rgba(88,166,255,0.05);
  }
  .copy-account .copy-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 12px;
    font-weight: 700;
    color: var(--blue);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .copy-account .copy-header .copy-acct { display: inline-flex; align-items: center; color: var(--text-dim); font-weight: 600; text-transform: none; letter-spacing: 0; }
  .copy-account .copy-status { margin-left: auto; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px; }
  .copy-account .copy-status.connected { color: var(--green); border: 1px solid var(--green); }
  .copy-account .copy-status.disconnected { color: var(--red); border: 1px solid var(--red); }

  /* Stat cards within agent */
  .stat-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .stat-card .label { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-card .value { font-size: 18px; font-weight: 700; margin-top: 2px; }
  .stat-card .value.positive { color: var(--green); }
  .stat-card .value.negative { color: var(--red); }
  .stat-card .sub { color: var(--text-dim); font-size: 10px; margin-top: 2px; }

  /* Positions within agent */
  .agent-positions {
    margin-bottom: 12px;
  }
  .section-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    margin-top: 10px;
  }
  .pos-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 4px;
    font-size: 12px;
    flex-wrap: wrap;
  }
  .pos-row .symbol { font-weight: 700; min-width: 160px; }
  .pos-row .side { font-weight: 600; min-width: 70px; }
  .pos-row .detail { color: var(--text-dim); min-width: 100px; }
  .pos-row .pnl { font-weight: 600; min-width: 90px; }
  .no-positions-msg {
    padding: 10px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  /* Blown banner within agent */
  .blown-banner {
    background: rgba(248,81,73,0.1);
    border: 1px solid var(--red);
    border-radius: 4px;
    padding: 8px 12px;
    margin-bottom: 10px;
    color: var(--red);
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .reset-inline {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
  }
  .reset-pw-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    width: 120px;
  }
  .reset-pw-input:focus { outline: none; border-color: var(--red); }
  .eval-pass-banner {
    background: rgba(0,200,83,0.1);
    border: 1px solid var(--green);
    border-radius: 4px;
    padding: 8px 12px;
    margin-bottom: 10px;
    color: var(--green);
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .btn-pass { background: var(--green); color: #000; font-size: 11px; padding: 4px 10px; font-weight: 700; }
  .pass-pw-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    width: 120px;
  }
  .pass-pw-input:focus { outline: none; border-color: var(--green); }
  .strategy-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
  }
  .practice-blown-banner {
    background: rgba(210,153,34,0.1);
    border: 1px solid var(--yellow);
    border-radius: 4px;
    padding: 8px 12px;
    margin-bottom: 10px;
    color: var(--yellow);
    font-size: 12px;
    font-weight: 600;
  }

  /* Reasoning & activity */
  .reasoning-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.5;
    max-height: 160px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 10px;
  }
  .activity-feed {
    max-height: 200px;
    overflow-y: auto;
  }
  .activity-entry {
    display: flex;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    align-items: flex-start;
  }
  .activity-entry:last-child { border-bottom: none; }
  .activity-time { color: var(--text-dim); white-space: nowrap; min-width: 55px; }
  .activity-kind {
    font-weight: 600;
    white-space: nowrap;
    min-width: 80px;
  }
  .activity-kind.tool-call { color: var(--yellow); }
  .activity-kind.response { color: var(--green); }
  .activity-kind.tool-result { color: var(--blue); }
  .activity-details {
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-word;
    flex: 1;
  }
  .agent-waiting {
    color: var(--text-dim);
    font-size: 12px;
    padding: 16px;
    text-align: center;
  }

  /* Collapsible sections */
  .toggle-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    font-size: 10px;
    margin-left: auto;
  }
  .toggle-btn:hover { color: var(--text); border-color: var(--text-dim); }

  .btn {
    padding: 6px 14px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-reset { background: var(--red); color: #fff; font-size: 11px; padding: 4px 10px; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  /* Activity log */
  #log {
    margin-top: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    max-height: 180px;
    overflow-y: auto;
    font-size: 12px;
    color: var(--text-dim);
  }
  #log .entry { margin-bottom: 4px; }
  #log .entry.success { color: var(--green); }
  #log .entry.error { color: var(--red); }
</style>
</head>
<body>

<h1>
  <span class="status-dot" id="wsDot"></span>
  <span style="-webkit-text-fill-color:transparent;background:linear-gradient(#f6dba6 25%,#e3a455 80%);-webkit-background-clip:text;background-clip:text;">TopstepX Agent Arena</span>
  <span id="marketBadge" style="font-size:11px;padding:2px 8px;border-radius:4px;display:none"></span>
</h1>

<div id="agentsContainer">
  <div class="agent-waiting">Loading agent data...</div>
</div>

<div class="section-label" style="margin-top:16px">Activity Log</div>
<div id="log"></div>

<script>
const $ = id => document.getElementById(id);
const fmt = (n, decimals=2) => {
  if (n == null) return '--';
  return n.toLocaleString('en-US', {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
};

let currentPrices = {};
let promotedAgent = '';
let copyAgent = '';
let availableStrategies = [];

// Fetch available strategies on load
fetch('/api/strategies').then(r => r.json()).then(s => { availableStrategies = s; }).catch(() => {
  availableStrategies = ['default', 'momentum', 'brainrot', 'scalper', 'futures'];
});

function log(msg, cls='') {
  const el = $('log');
  const ts = new Date().toLocaleTimeString();
  el.innerHTML = `<div class="entry ${cls}">[${ts}] ${msg}</div>` + el.innerHTML;
  while (el.children.length > 50) el.removeChild(el.lastChild);
}

function strategyDropdown(id, currentStrategy) {
  const opts = availableStrategies.map(s =>
    '<option value="' + s + '"' + (s === currentStrategy ? ' selected' : '') + '>' + s + '</option>'
  ).join('');
  return '<select id="' + id + '" class="strategy-select">' + opts + '</select>';
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function getLogoSvg(key) { return logoSvgs[key] || logoSvgs.openai; }

// ── WebSocket ──────────────────────────────────────────
let ws;
let wsReconnectTimer = null;

function connectWS() {
  if (ws) {
    ws.onclose = null; ws.onerror = null; ws.onmessage = null;
    try { ws.close(); } catch(e) {}
    ws = null;
  }
  if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    $('wsDot').classList.add('connected');
    log('Connected to server');
  };
  ws.onclose = () => {
    $('wsDot').classList.remove('connected');
    wsReconnectTimer = setTimeout(connectWS, 500);
  };
  ws.onerror = () => {};
  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.prices) currentPrices = data.prices;
      if (data.promoted_agent !== undefined) promotedAgent = data.promoted_agent;
      if (data.copy_agent !== undefined) copyAgent = data.copy_agent;

      // Market badge
      const mb = $('marketBadge');
      if (data.market_open) {
        mb.textContent = 'MARKET OPEN';
        mb.style.color = 'var(--green)';
        mb.style.border = '1px solid var(--green)';
      } else {
        mb.textContent = 'MARKET CLOSED';
        mb.style.color = 'var(--red)';
        mb.style.border = '1px solid var(--red)';
      }
      mb.style.display = 'inline';

      if (data.agents) renderAgents(data.agents);
    } catch(err) {
      console.error('WS parse error', err);
    }
  };
}

// ── Render all agent dashboards ────────────────────────
function renderAgents(agents) {
  const container = $('agentsContainer');
  // Pin the z-ai/glm-4.5-air agent to the top of the list, rest alphabetical
  const isPinned = name => (agents[name].model || '').includes('glm-4.5-air');
  const names = Object.keys(agents).sort((a, b) => {
    if (isPinned(a) !== isPinned(b)) return isPinned(a) ? -1 : 1;
    return a.localeCompare(b);
  });

  // Update agent select dropdown for manual trading
  if (names.length === 0) {
    container.innerHTML = '<div class="agent-waiting">Loading agent data...</div>';
    return;
  }

  names.forEach(name => {
    const agent = agents[name];
    const panelId = 'agent-dash-' + name.replace(/[^a-zA-Z0-9-]/g, '_');
    let panel = document.getElementById(panelId);

    if (!panel) {
      panel = document.createElement('div');
      panel.id = panelId;
      panel.className = 'agent-dashboard';
      container.appendChild(panel);
    }

    renderAgentPanel(panel, name, agent);
  });

  // Enforce display order (pinned agent first); only moves a panel when out of place
  names.forEach((name, i) => {
    const panelId = 'agent-dash-' + name.replace(/[^a-zA-Z0-9-]/g, '_');
    const panel = document.getElementById(panelId);
    if (panel && container.children[i] !== panel) {
      container.insertBefore(panel, container.children[i] || null);
    }
  });

  // Remove stale panels + placeholder
  Array.from(container.children).forEach(el => {
    if (!el.id || !el.id.startsWith('agent-dash-')) {
      el.remove();
    } else {
      const found = names.some(n => 'agent-dash-' + n.replace(/[^a-zA-Z0-9-]/g, '_') === el.id);
      if (!found) el.remove();
    }
  });
}

function renderAgentPanel(panel, name, agent) {
  const isBlown = agent.simAccount && agent.simAccount.blown;
  const practiceBlown = agent.practiceAccount && agent.practiceAccount.blown;
  const isPromoted = promotedAgent && name === promotedAgent;
  const isMirror = isPromoted;
  const currentStrategy = agent.strategy || '';
  panel.className = 'agent-dashboard' + (isBlown ? ' blown' : '');

  // Model title
  let titleHtml = escapeHtml(name);
  if (agent.model) {
    titleHtml = getLogoSvg(agent.logo) + escapeHtml(agent.model.replace('gpt-5-nano', 'openai/gpt-5-nano').replace(':free', ''));
  }

  // Sentiment
  const s = (agent.sentiment || 'neutral').toLowerCase();
  const badgeClass = 'badge badge-' + s;

  // Last active
  let lastActive = 'Waiting...';
  if (agent.last_active) {
    lastActive = new Date(agent.last_active).toLocaleTimeString();
  }

  // Stats from webAccount
  const wa = agent.webAccount || {};
  const balance = agent.balance || 0;
  const equity = agent.equity || 0;
  const dayPnl = wa.realizedDayPnl || 0;
  const totalPnl = wa.profitAndLoss || 0;
  const wr = wa.winRate || 0;
  const totalTrades = wa.totalTrades || 0;
  const hwm = wa.highestBalance || balance;

  // Positions
  const positions = agent.positions || [];
  const totalUnrealized = positions.reduce((sum, p) => sum + (p.unrealizedPnL || 0), 0);

  // Eval rules: profit goal by account size
  const startingBal = wa.startingBalance || 150000;
  const evalGoals = {50000: 3000, 100000: 6000, 150000: 9000};
  const profitGoal = evalGoals[startingBal] || (startingBal / 150000 * 9000);
  const evalPassed = !isBlown && totalPnl >= profitGoal;

  // Banners
  let bannersHtml = '';
  if (evalPassed) {
    const passId = panel.id + '-pass';
    const passStratId = panel.id + '-pass-strat';
    bannersHtml += '<div class="eval-pass-banner">' +
      '<span>Eval passed! $' + fmt(totalPnl) + ' / $' + fmt(profitGoal) + ' profit goal reached</span>' +
      '<span class="reset-inline" id="' + passId + '">' +
        '<label style="font-size:11px;color:var(--muted)">Next strategy:</label>' +
        strategyDropdown(passStratId, currentStrategy) +
        '<input type="password" placeholder="Password" class="pass-pw-input" onkeydown="if(event.key===\'Enter\')this.nextElementSibling.click()">' +
        '<button class="btn btn-pass" onclick="passEval(\'' + escapeHtml(name) + '\', this.previousElementSibling.value, document.getElementById(\'' + passStratId + '\').value)">PASS EVAL</button>' +
      '</span>' +
      '</div>';
  }
  if (isBlown) {
    const resetId = panel.id + '-reset';
    const resetStratId = panel.id + '-reset-strat';
    bannersHtml += '<div class="blown-banner">' +
      '<span>Account blown - hit the trailing loss limit</span>' +
      '<span class="reset-inline" id="' + resetId + '">' +
        '<label style="font-size:11px;color:var(--muted)">Next strategy:</label>' +
        strategyDropdown(resetStratId, currentStrategy) +
        '<input type="password" placeholder="Password" class="reset-pw-input" onkeydown="if(event.key===\'Enter\')this.nextElementSibling.click()">' +
        '<button class="btn btn-reset" onclick="resetAgent(\'' + escapeHtml(name) + '\', this.previousElementSibling.value, document.getElementById(\'' + resetStratId + '\').value)">RESET</button>' +
      '</span>' +
      '</div>';
  }
  if (practiceBlown) {
    bannersHtml += '<div class="practice-blown-banner">TopstepX practice account is blown - reset on TopstepX platform</div>';
  }

  // Positions HTML
  let posHtml = '';
  if (positions.length === 0) {
    posHtml = '<div class="no-positions-msg">No open positions</div>';
  } else {
    posHtml = positions.map(p => {
      const qty = p.quantity;
      const side = qty > 0 ? 'LONG' : 'SHORT';
      const sideColor = qty > 0 ? 'var(--green)' : 'var(--red)';
      const pnl = p.unrealizedPnL || 0;
      const pnlColor = pnl >= 0 ? 'var(--green)' : 'var(--red)';
      const mp = currentPrices[p.symbol];
      const mpStr = mp != null ? '$' + fmt(mp) : '--';
      return '<div class="pos-row">' +
        '<span class="symbol">' + escapeHtml(p.symbol) + '</span>' +
        '<span class="side" style="color:' + sideColor + '">' + side + ' ' + Math.abs(qty) + '</span>' +
        '<span class="detail">Avg $' + fmt(p.avgPrice) + '</span>' +
        '<span class="detail">Mkt ' + mpStr + '</span>' +
        '<span class="pnl" style="color:' + pnlColor + '">' + (pnl >= 0 ? '+' : '') + '$' + fmt(pnl) + '</span>' +
        '</div>';
    }).join('');
  }

  // Reasoning
  const raw = agent.latest_reasoning || 'No reasoning yet';
  const prefixMatch = raw.match(/^\[(.+?)\]\s*(.*)/s);
  let reasoningHtml;
  if (prefixMatch) {
    reasoningHtml = '<div style="font-weight:bold;margin-bottom:4px;color:var(--blue)">' +
      escapeHtml(prefixMatch[1]) + '</div><div>' + escapeHtml(prefixMatch[2]) + '</div>';
  } else {
    reasoningHtml = escapeHtml(raw);
  }

  // Activity feed
  const activity = agent.activity || [];
  let feedHtml;
  if (activity.length === 0) {
    feedHtml = '<div class="agent-waiting">No activity yet</div>';
  } else {
    feedHtml = activity.slice().reverse().map(e => {
      const kindClass = e.kind === 'TOOL CALL' ? 'tool-call' : e.kind === 'RESPONSE' ? 'response' : 'tool-result';
      return '<div class="activity-entry">' +
        '<span class="activity-time">' + e.time + '</span>' +
        '<span class="activity-kind ' + kindClass + '">' + e.kind + '</span>' +
        '<span class="activity-details">' + escapeHtml(e.details) + '</span>' +
        '</div>';
    }).join('');
  }

  // NinjaTrader copy-account sub-panel (mirrored trades on a real account)
  let copyHtml = '';
  const ca = agent.copyAccount;
  if (ca) {
    // NinjaTrader "NT" logo, used in place of the word "NinjaTrader".
    const ntLogo = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="150 332 898 536" fill="#FF4200" style="height:0.85lh;width:auto;display:block;flex:none;margin-right:5px" aria-label="NinjaTrader">' +
      '<path d="M150 332 L332 332 L868 868 L508 868 L150 510 Z"/>' +
      '<path d="M510 332 L1048 332 L1048 512 L870 512 L870 868 L690 868 L690 512 L510 512 Z"/>' +
      '<path d="M150 686 L330 686 L330 868 L150 868 Z"/></svg>';
    const isConn = (ca.status || '').toLowerCase() === 'connected';
    const statusCls = isConn ? 'connected' : 'disconnected';
    const statusTxt = ca.status || (ca.loading ? 'Loading' : 'Unknown');
    let copyBody;
    if (ca.loading) {
      copyBody = '<div class="no-positions-msg">Connecting to NinjaTrader bridge...</div>';
    } else {
      const cEquity = ca.equity || 0;
      const cBalance = ca.balance || 0;
      const cUnreal = ca.unrealizedPnL || 0;
      const cDay = ca.realizedDayPnl || 0;
      const cWr = ca.winRate || 0;
      const cTrades = ca.totalTrades || 0;
      const cPositions = ca.positions || [];
      let cPosHtml;
      if (cPositions.length === 0) {
        cPosHtml = '<div class="no-positions-msg">No open positions</div>';
      } else {
        cPosHtml = cPositions.map(p => {
          const qty = p.quantity;
          const side = qty > 0 ? 'LONG' : 'SHORT';
          const sideColor = qty > 0 ? 'var(--green)' : 'var(--red)';
          const pnl = p.unrealizedPnL || 0;
          const pnlColor = pnl >= 0 ? 'var(--green)' : 'var(--red)';
          return '<div class="pos-row">' +
            '<span class="symbol">' + escapeHtml(p.symbol) + '</span>' +
            '<span class="side" style="color:' + sideColor + '">' + side + ' ' + Math.abs(qty) + '</span>' +
            '<span class="detail">Avg $' + fmt(p.avgPrice) + '</span>' +
            '<span class="pnl" style="color:' + pnlColor + '">' + (pnl >= 0 ? '+' : '') + '$' + fmt(pnl) + '</span>' +
            '</div>';
        }).join('');
      }
      copyBody =
        '<div class="stat-cards">' +
          '<div class="stat-card"><div class="label">Equity</div>' +
            '<div class="value">$' + fmt(cEquity) + '</div>' +
            '<div class="sub">Bal $' + fmt(cBalance) + '</div></div>' +
          '<div class="stat-card"><div class="label">Unrealized P&L</div>' +
            '<div class="value ' + (cUnreal >= 0 ? 'positive' : 'negative') + '">' +
            (cUnreal >= 0 ? '+' : '') + '$' + fmt(cUnreal) + '</div>' +
            '<div class="sub">' + cPositions.length + ' position(s)</div></div>' +
          '<div class="stat-card"><div class="label">Day P&L</div>' +
            '<div class="value ' + (cDay >= 0 ? 'positive' : 'negative') + '">' +
            (cDay >= 0 ? '+' : '') + '$' + fmt(cDay) + '</div></div>' +
          '<div class="stat-card"><div class="label">Win Rate</div>' +
            '<div class="value">' + (cWr * 100).toFixed(1) + '%</div>' +
            '<div class="sub">' + cTrades + ' trades</div></div>' +
        '</div>' +
        '<div class="agent-positions"><div class="section-label">Copied Positions</div>' + cPosHtml + '</div>';
    }
    copyHtml =
      '<div class="copy-account">' +
        '<div class="copy-header">Copied Account' +
          '<span class="copy-acct">' + ntLogo + escapeHtml(ca.account || '') + '</span>' +
          '<span class="copy-status ' + statusCls + '">' + escapeHtml(statusTxt) + '</span>' +
        '</div>' +
        copyBody +
      '</div>';
  }

  const bodyId = panel.id + '-body';
  const existingBody = document.getElementById(bodyId);
  const isExpanded = existingBody ? !existingBody.classList.contains('collapsed') : false;
  const detailsId = panel.id + '-details';

  // Build header HTML (always updated)
  const headerHtml =
    '<div class="agent-dash-header' + (isExpanded ? ' expanded' : '') + '" onclick="togglePanel(\'' + bodyId + '\', this)">' +
      '<span class="agent-dash-name">' + titleHtml + '</span>' +
      '<span class="' + badgeClass + '">' + s.toUpperCase() + '</span>' +
      (isBlown ? '<span class="badge badge-blown">BLOWN</span>' : '') +
      (isPromoted ? '<span class="badge badge-live">LIVE</span>' : '') +
      (isMirror ? '<span class="badge badge-mirror"><span>' + escapeHtml((agent.practiceAccount && agent.practiceAccount.name) || 'TopstepX') + '</span></span>' : '') +
      (agent.copyAccount ? '<span class="badge badge-copy">COPY → ' + escapeHtml(agent.copyAccount.account || 'NT') + '</span>' : '') +
      '<span class="agent-dash-meta">Agent: ' + escapeHtml(name) + '</span>' +
      (agent.strategy ? '<span class="agent-dash-meta">Strategy: ' + escapeHtml(agent.strategy) + '</span>' : '') +
      '<span class="agent-dash-meta">' + lastActive + '</span>' +
      '<span class="header-pnl" style="margin-left:auto;font-weight:700;font-size:13px;color:' + (totalPnl + totalUnrealized >= 0 ? 'var(--green)' : 'var(--red)') + '">' +
        (totalPnl + totalUnrealized >= 0 ? '+' : '') + '$' + fmt(totalPnl + totalUnrealized) +
      '</span>' +
      '<span class="header-chevron' + (isExpanded ? ' open' : '') + '">&#9662;</span>' +
    '</div>';

  // Build body HTML
  const existingDetails = document.getElementById(detailsId);
  const detailsCollapsed = existingDetails ? existingDetails.style.display === 'none' : false;

  const bodyHtml =
    '<div id="' + bodyId + '" class="agent-dash-body' + (isExpanded ? '' : ' collapsed') + '">' +
      bannersHtml +
      '<div class="stat-cards">' +
        '<div class="stat-card">' +
          '<div class="label">Equity</div>' +
          '<div class="value">$' + fmt(equity) + '</div>' +
          '<div class="sub">Bal $' + fmt(balance) + ' | HWM $' + fmt(hwm) + '</div>' +
        '</div>' +
        '<div class="stat-card">' +
          '<div class="label">Unrealized P&L</div>' +
          '<div class="value ' + (totalUnrealized >= 0 ? 'positive' : 'negative') + '">' +
            (totalUnrealized >= 0 ? '+' : '') + '$' + fmt(totalUnrealized) +
          '</div>' +
          '<div class="sub">' + positions.length + ' position(s)</div>' +
        '</div>' +
        '<div class="stat-card">' +
          '<div class="label">Day P&L</div>' +
          '<div class="value ' + (dayPnl >= 0 ? 'positive' : 'negative') + '">' +
            (dayPnl >= 0 ? '+' : '') + '$' + fmt(dayPnl) +
          '</div>' +
          '<div class="sub">Total: <span style="color:' + (totalPnl >= 0 ? 'var(--green)' : 'var(--red)') + '">' +
            (totalPnl >= 0 ? '+' : '') + '$' + fmt(totalPnl) + '</span></div>' +
        '</div>' +
        '<div class="stat-card">' +
          '<div class="label">Win Rate</div>' +
          '<div class="value">' + (wr * 100).toFixed(1) + '%</div>' +
          '<div class="sub">' + totalTrades + ' trades</div>' +
        '</div>' +
      '</div>' +
      copyHtml +
      '<div class="agent-positions">' +
        '<div class="section-label">Open Positions</div>' +
        posHtml +
      '</div>' +
      '<button class="toggle-btn" onclick="event.stopPropagation(); toggleDetails(\'' + detailsId + '\', this)">' +
        (detailsCollapsed ? 'SHOW' : 'HIDE') + ' DETAILS</button>' +
      '<div id="' + detailsId + '" style="' + (detailsCollapsed ? 'display:none' : '') + '">' +
        '<div class="section-label">Latest Reasoning</div>' +
        '<div class="reasoning-block">' + reasoningHtml + '</div>' +
        '<div class="section-label">Recent Activity</div>' +
        '<div class="activity-feed">' + feedHtml + '</div>' +
      '</div>' +
    '</div>';

  if (!existingBody) {
    // First render: build everything, start collapsed
    panel.innerHTML = headerHtml + bodyHtml;
  } else if (isExpanded) {
    // If user is interacting with any input/select inside this panel, skip re-render
    const activeEl = document.activeElement;
    const userInteracting = activeEl && panel.contains(activeEl) &&
      (activeEl.tagName === 'INPUT' || activeEl.tagName === 'SELECT');
    if (userInteracting) {
      // Only update the header (stats badge, sentiment, etc.)
      const header = panel.querySelector('.agent-dash-header');
      if (header) {
        const tmp = document.createElement('div');
        tmp.innerHTML = headerHtml;
        panel.replaceChild(tmp.firstChild, header);
      }
    } else {
      // Full re-render when user is not interacting
      panel.innerHTML = headerHtml + bodyHtml;
      const body = document.getElementById(bodyId);
      if (body) body.style.maxHeight = body.scrollHeight + 'px';
    }
  } else {
    // Collapsed or collapsing: only update the header, leave body DOM untouched
    const header = panel.querySelector('.agent-dash-header');
    if (header) {
      const tmp = document.createElement('div');
      tmp.innerHTML = headerHtml;
      panel.replaceChild(tmp.firstChild, header);
    }
  }
}

function togglePanel(bodyId, headerEl) {
  const body = document.getElementById(bodyId);
  if (!body) return;
  const chevron = headerEl.querySelector('.header-chevron');
  const isCollapsed = body.classList.contains('collapsed');

  if (isCollapsed) {
    // Expand
    body.classList.remove('collapsed');
    body.style.maxHeight = body.scrollHeight + 'px';
    body.style.opacity = '';
    body.style.pointerEvents = '';
    headerEl.classList.add('expanded');
    if (chevron) chevron.classList.add('open');
  } else {
    // Collapse
    body.style.maxHeight = body.scrollHeight + 'px';
    body.offsetHeight; // force reflow
    body.style.maxHeight = '0px';
    body.style.opacity = '0';
    body.style.pointerEvents = 'none';
    body.classList.add('collapsed');
    headerEl.classList.remove('expanded');
    if (chevron) chevron.classList.remove('open');
  }
}

function toggleDetails(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  if (el.style.display === 'none') {
    el.style.display = '';
    btn.textContent = 'HIDE DETAILS';
  } else {
    el.style.display = 'none';
    btn.textContent = 'SHOW DETAILS';
  }
  // Update parent body max-height after toggling inner details
  const body = el.closest('.agent-dash-body');
  if (body && !body.classList.contains('collapsed')) {
    setTimeout(() => { body.style.maxHeight = body.scrollHeight + 'px'; }, 10);
  }
}

// ── Trade actions ──────────────────────────────────────
async function updateStrategy(agent, pw, newStrategy) {
  if (!newStrategy) return true; // no change needed
  const resp = await fetch('/api/update-strategy', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({agent_name: agent, strategy: newStrategy, password: pw}),
  });
  const data = await resp.json();
  if (data.success) {
    log(`Strategy updated: ${data.old_strategy} → ${data.new_strategy} (restart agents service to apply)`, 'success');
    return true;
  } else {
    log(`Strategy update failed: ${data.error || 'Unknown error'}`, 'error');
    return false;
  }
}

async function passEval(agent, pw, newStrategy) {
  if (!pw) { log('Enter a password to pass eval', 'error'); return; }
  if (!confirm('Record PASSED eval for ' + agent + '? This will record the result and reset the account for a fresh start.')) return;
  log(`Recording eval pass for ${agent}...`);
  try {
    // Record the eval pass
    const evalResp = await fetch('/api/eval-result', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({agent_name: agent, passed: true, password: pw}),
    });
    const evalData = await evalResp.json();
    if (!evalData.success) {
      log(`Eval record failed: ${evalData.error || 'Unknown error'}`, 'error');
      return;
    }
    // Update strategy in agents.yml if changed
    if (newStrategy) await updateStrategy(agent, pw, newStrategy);
    // Reset the account for a fresh start
    const resetResp = await fetch(`/api/reset-account?agent=${encodeURIComponent(agent)}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw}),
    });
    const resetData = await resetResp.json();
    if (resetData.success) {
      log(`${agent} PASSED eval! Account reset to $${fmt(resetData.balance)} for fresh start.`, 'success');
    } else {
      log(`Eval recorded but reset failed: ${resetData.error || 'Unknown error'}`, 'error');
    }
  } catch(err) {
    log(`Pass eval error: ${err.message}`, 'error');
  }
}

async function resetAgent(agent, pw, newStrategy) {
  if (!pw) { log('Enter a password to reset', 'error'); return; }
  if (!confirm('Reset ' + agent + '? Balance restored to starting value, positions closed.')) return;
  log(`Resetting ${agent}...`);
  try {
    // Update strategy in agents.yml if changed
    if (newStrategy) await updateStrategy(agent, pw, newStrategy);
    const resp = await fetch(`/api/reset-account?agent=${encodeURIComponent(agent)}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw}),
    });
    const data = await resp.json();
    if (data.success) {
      log(`${agent} reset to $${fmt(data.balance)}`, 'success');
    } else {
      log(`Reset failed: ${data.error || 'Unknown error'}`, 'error');
    }
  } catch(err) {
    log(`Reset error: ${err.message}`, 'error');
  }
}

connectWS();
