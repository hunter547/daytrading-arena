# Host-network variant for servers with broken Docker bridge networking.
# Usage: docker compose -f docker-compose.host-network.yml up
services:
  # 1. Zookeeper (required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: futures-zookeeper
    network_mode: host
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_ADMIN_ENABLE_SERVER: "false"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: futures-kafka
    network_mode: host
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: localhost:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # 2b. Topic Initialization (one-shot)
  init-topics:
    image: confluentinc/cp-kafka:7.5.0
    container_name: futures-init-topics
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./create-topics.sh:/create-topics.sh
      - ./agents.yml:/agents.yml:ro
    command: ["bash", "/create-topics.sh"]
    restart: "no"

  # 3. Agent Trigger (periodic heartbeat → agent_router.input)
  market-connector:
    build:
      context: .
      network: host
    container_name: futures-market-connector
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092
      - SERVICE_NAME=agent_trigger
    command: >
      python unified_market_connector.py
      --bootstrap-servers localhost:9092
      --trigger-interval 60
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # 4. MySQL (Simulated Trading Accounts)
  mysql:
    image: mysql:8.0
    container_name: futures-mysql
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
      MYSQL_DATABASE: trading_arena
      MYSQL_USER: trading
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-trading_pass}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # 5. TopstepX Trading Tools Service
  trading-tools:
    build:
      context: .
      network: host
    container_name: futures-trading-tools
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092
      - TOPSTEPX_USERNAME=${TOPSTEPX_USERNAME}
      - TOPSTEPX_API_KEY=${TOPSTEPX_API_KEY}
      - TOPSTEPX_ENVIRONMENT=${TOPSTEPX_ENVIRONMENT:-demo}
      - MYSQL_HOST=localhost
      - MYSQL_PORT=3306
      - MYSQL_USER=trading
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-trading_pass}
      - MYSQL_DATABASE=trading_arena
      - SERVICE_NAME=topstepx_trading_tools
      - DASHBOARD_PORT=8080
      - AGENT_NAME=futures-trader
      - AGENT_MODEL=gpt-5-nano
      - AGENT_STRATEGY=futures
      - TOPSTEP_REFRESH_TOKEN=${TOPSTEP_REFRESH_TOKEN:-}
      - MIRROR_AGENT=${MIRROR_AGENT:-}
    command: >
      python topstepx_trading_tools.py
      --bootstrap-servers localhost:9092
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # 5. Tools & Dashboard (Crypto - optional)
  dashboard:
    build:
      context: .
      network: host
    container_name: futures-dashboard
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092
      - TOPSTEPX_USERNAME=${TOPSTEPX_USERNAME}
      - TOPSTEPX_API_KEY=${TOPSTEPX_API_KEY}
      - TOPSTEPX_ENVIRONMENT=${TOPSTEPX_ENVIRONMENT:-demo}
      - SERVICE_NAME=tools_and_dashboard
    command: >
      python tools_and_dashboard.py
      --bootstrap-servers localhost:9092
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    profiles:
      - crypto

  # 6. Agent Launcher (reads agents.yml, spawns ChatNodes + Agent Routers)
  agents:
    build:
      context: .
      network: host
    container_name: futures-agents
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully
      market-connector:
        condition: service_started
      trading-tools:
        condition: service_started
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - SERVICE_NAME=agent_launcher
    command: >
      python agent_launcher.py
      --bootstrap-servers localhost:9092
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./agents.yml:/app/agents.yml:ro

  # 7. Response Viewer (Optional - Agent Activity Monitor)
  response-viewer:
    build:
      context: .
      network: host
    container_name: futures-response-viewer
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092
      - SERVICE_NAME=response_viewer
    command: >
      python response_viewer.py
      --bootstrap-servers localhost:9092
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    profiles:
      - monitoring

volumes:
  logs:
    driver: local
  mysql-data:
    driver: local
