# Host-network variant for servers with broken Docker bridge networking.
# Usage: docker compose -f docker-compose.host-network.yml up
services:
  # 1. Zookeeper (required by Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: futures-zookeeper
    network_mode: host
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_ADMIN_ENABLE_SERVER: "false"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: futures-kafka
    network_mode: host
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: localhost:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # 2b. Topic Initialization (one-shot)
  init-topics:
    image: confluentinc/cp-kafka:7.5.0
    container_name: futures-init-topics
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./create-topics.sh:/create-topics.sh
    command: ["bash", "/create-topics.sh"]
    restart: "no"

  # 3. Market Data Connector (TopstepX → Kafka)
  market-connector:
    build:
      context: .
      network: host
    container_name: futures-market-connector
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092
      - TOPSTEPX_USERNAME=${TOPSTEPX_USERNAME}
      - TOPSTEPX_API_KEY=${TOPSTEPX_API_KEY}
      - TOPSTEPX_ENVIRONMENT=${TOPSTEPX_ENVIRONMENT:-demo}
      - SERVICE_NAME=unified_market_connector
    command: >
      python unified_market_connector.py
      --provider topstepx
      --symbols CON.F.US.MES.H26
      --bootstrap-servers localhost:9092
      --candles-only
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # 4. TopstepX Trading Tools Service
  trading-tools:
    build:
      context: .
      network: host
    container_name: futures-trading-tools
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
      init-topics:
        condition: service_completed_successfully
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092
      - TOPSTEPX_USERNAME=${TOPSTEPX_USERNAME}
      - TOPSTEPX_API_KEY=${TOPSTEPX_API_KEY}
      - TOPSTEPX_ENVIRONMENT=${TOPSTEPX_ENVIRONMENT:-demo}
      - SERVICE_NAME=topstepx_trading_tools
      - DASHBOARD_PORT=8080
      - DASHBOARD_VIEW_ONLY=${DASHBOARD_VIEW_ONLY:-true}
      - AGENT_NAME=futures-trader
      - AGENT_MODEL=gpt-5-nano
      - AGENT_STRATEGY=futures
      - TOPSTEPX_STREAM_SYMBOLS=CON.F.US.MES.H26
    command: >
      python topstepx_trading_tools.py
      --bootstrap-servers localhost:9092
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # 5. Tools & Dashboard (Crypto - optional)
  dashboard:
    build:
      context: .
      network: host
    container_name: futures-dashboard
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092
      - TOPSTEPX_USERNAME=${TOPSTEPX_USERNAME}
      - TOPSTEPX_API_KEY=${TOPSTEPX_API_KEY}
      - TOPSTEPX_ENVIRONMENT=${TOPSTEPX_ENVIRONMENT:-demo}
      - SERVICE_NAME=tools_and_dashboard
    command: >
      python tools_and_dashboard.py
      --bootstrap-servers localhost:9092
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    profiles:
      - crypto

  # 6. ChatNode (LLM Inference - GPT-5 Nano)
  chatnode:
    build:
      context: .
      network: host
    container_name: futures-chatnode
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SERVICE_NAME=deploy_chat_node
    command: >
      python deploy_chat_node.py
      --name gpt5-nano
      --model-id gpt-5-nano
      --bootstrap-servers localhost:9092
      --reasoning-effort low
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # 7. Agent Router (Futures Trader)
  agent:
    build:
      context: .
      network: host
    container_name: futures-agent
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
      chatnode:
        condition: service_started
      market-connector:
        condition: service_started
      trading-tools:
        condition: service_started
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092
      - SERVICE_NAME=deploy_router_node
    command: >
      python deploy_router_node.py
      --name futures-trader
      --chat-node-name gpt5-nano
      --strategy futures
      --bootstrap-servers localhost:9092
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs

  # 8. Response Viewer (Optional - Agent Activity Monitor)
  response-viewer:
    build:
      context: .
      network: host
    container_name: futures-response-viewer
    network_mode: host
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=localhost:9092
      - SERVICE_NAME=response_viewer
    command: >
      python response_viewer.py
      --bootstrap-servers localhost:9092
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    profiles:
      - monitoring

volumes:
  logs:
    driver: local
